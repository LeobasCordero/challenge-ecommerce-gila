ProductDto:
  type: object
  required:
    - name
    - price
    - stock
    - category
  properties:
    id:
      type: string
      format: uuid
    name:
      type: string
    description:
      type: string
    price:
      type: number
      format: double
    stock:
      type: integer
      format: int32
    category:
      type: string

ProductImportStatusDto:
  type: object
  required:
    - taskId
    - status
    - totalRows
    - processedRows
    - errorCount
    - warnings
  properties:
    taskId:
      type: string
      format: uuid
    status:
      type: string
      example: COMPLETED
    totalRows:
      type: integer
    processedRows:
      type: integer
    errorCount:
      type: integer
    warnings:
      type: array
      items:
        type: string
        description: Specific logs warning on stock clamps, sanitisations, etc.
