CartDto:
  type: object
  required:
    - items
    - totalPrice
  properties:
    items:
      type: array
      items:
        $ref: './cart.yaml#/CartItemDto'
    totalPrice:
      type: number
      format: double

CartItemDto:
  type: object
  required:
    - product
    - quantity
  properties:
    product:
      $ref: './products.yaml#/ProductDto'
    quantity:
      type: integer

CartItemRequestDto:
  type: object
  required:
    - productId
    - quantity
  properties:
    productId:
      type: string
      format: uuid
    quantity:
      type: integer
      minimum: 1
