OrderDto:
  type: object
  required:
    - id
    - status
    - totalPrice
    - items
    - createdAt
  properties:
    id:
      type: string
      format: uuid
    status:
      type: string
      example: PAID
    totalPrice:
      type: number
      format: double
    items:
      type: array
      items:
        $ref: './orders.yaml#/OrderItemDto'
    createdAt:
      type: string
      format: date-time

OrderItemDto:
  type: object
  required:
    - product
    - quantity
    - priceAtPurchase
  properties:
    product:
      $ref: './products.yaml#/ProductDto'
    quantity:
      type: integer
    priceAtPurchase:
      type: number
      format: double
