post:
  tags:
    - Orders
  summary: Process checkout for the current cart (Customer only)
  operationId: checkout
  responses:
    '200':
      description: Order checked out and payment authorized successfully
      content:
        application/json:
          schema:
            $ref: '../components/schemas/orders.yaml#/OrderDto'
    '400':
      description: Empty cart or stock validation failed
    '401':
      description: Unauthorized
    '403':
      description: Forbidden (requires customer role)
