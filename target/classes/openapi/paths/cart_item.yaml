delete:
  tags:
    - Cart
  summary: Remove a specific item from the cart (Customer only)
  operationId: removeCartItem
  parameters:
    - name: productId
      in: path
      required: true
      schema:
        type: string
        format: uuid
  responses:
    '200':
      description: Item removed and updated cart returned
      content:
        application/json:
          schema:
            $ref: '../components/schemas/cart.yaml#/CartDto'
    '404':
      description: Product not found in cart
    '403':
      description: Forbidden (requires customer role)
