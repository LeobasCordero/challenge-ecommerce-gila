<header class="header">
  <div class="container header-wrapper">
    <div class="header-logo" routerLink="/">
      <mat-icon class="logo-icon">shopping_bag</mat-icon>
      <span>Gila Store</span>
    </div>
    
    <nav class="header-nav">
      <a class="header-link" *ngIf="authState.isAuthenticated() && !isOnLoginPage()" routerLink="/catalog" routerLinkActive="active" i18n="@@navCatalog">Catalog</a>
      <a class="header-link" *ngIf="authState.isAdmin() && !isOnLoginPage()" routerLink="/admin" routerLinkActive="active" i18n="@@navAdmin">Admin</a>
      
      <div class="nav-divider" *ngIf="authState.isAuthenticated() && !isOnLoginPage()"></div>
      
      <!-- i18n Language Selector -->
      <button mat-button [matMenuTriggerFor]="langMenu" class="lang-selector-btn">
        <mat-icon>language</mat-icon>
        <span class="lang-text">{{ currentLang().toUpperCase() }}</span>
      </button>
      <mat-menu #langMenu="matMenu" xPosition="before">
        <button mat-menu-item (click)="switchLanguage('en')">English</button>
        <button mat-menu-item (click)="switchLanguage('es')">Español</button>
      </mat-menu>

      <a class="header-link cart-btn" *ngIf="authState.isAuthenticated() && authState.isCustomer() && !isOnLoginPage()" routerLink="/catalog" [queryParams]="{ cartOpen: true }">
        <mat-icon>shopping_cart</mat-icon>
        <span class="cart-badge" *ngIf="cartState.itemCount() > 0">{{ cartState.itemCount() }}</span>
      </a>

      <!-- User Session Management -->
      <ng-container *ngIf="authState.isAuthenticated() && !isOnLoginPage(); else guestView">
        <span class="user-greeting">Hi, {{ authState.username() }}</span>
        <button mat-icon-button color="warn" (click)="logout()" [attr.aria-label]="'Logout'">
          <mat-icon>logout</mat-icon>
        </button>
      </ng-container>
      <ng-template #guestView>
        <button *ngIf="!isOnLoginPage()" mat-stroked-button color="primary" class="login-btn-header" routerLink="/login" i18n="@@navLogin">Login</button>
      </ng-template>
    </nav>
  </div>
</header>

<main class="main-content">
  <router-outlet></router-outlet>
</main>

<app-chatbot></app-chatbot>
