<div class="login-container">
  <mat-card class="login-card">
    <mat-card-header>
      <mat-card-title>
        <span>{{ 'loginTitle' | translate }}</span>
      </mat-card-title>
      <mat-card-subtitle>
        <span>{{ 'loginSubtitle' | translate }}</span>
      </mat-card-subtitle>
    </mat-card-header>
    
    <mat-card-content>
      <form [formGroup]="loginForm" (ngSubmit)="onSubmit()" class="login-form">
        <mat-form-field appearance="outline" class="full-width">
          <mat-label>{{ 'usernameLabel' | translate }}</mat-label>
          <input matInput formControlName="username" placeholder="e.g. admin or customer" required>
          <mat-error *ngIf="loginForm.get('username')?.hasError('required')">
            <span>{{ 'usernameRequired' | translate }}</span>
          </mat-error>
        </mat-form-field>

        <mat-form-field appearance="outline" class="full-width">
          <mat-label>{{ 'passwordLabel' | translate }}</mat-label>
          <input matInput [type]="hidePassword() ? 'password' : 'text'" formControlName="password" required>
          <button mat-icon-button matSuffix (click)="hidePassword.set(!hidePassword())" type="button" [attr.aria-label]="'Hide password'" [attr.aria-pressed]="hidePassword()">
            <mat-icon>{{hidePassword() ? 'visibility_off' : 'visibility'}}</mat-icon>
          </button>
          <mat-error *ngIf="loginForm.get('password')?.hasError('required')">
            <span>{{ 'passwordRequired' | translate }}</span>
          </mat-error>
        </mat-form-field>

        <div *ngIf="errorMessage()" class="error-message">
          {{ errorMessage() }}
        </div>

        <button mat-raised-button color="primary" class="full-width login-button" type="submit" [disabled]="loginForm.invalid || isLoading()">
          <mat-spinner diameter="20" *ngIf="isLoading()" class="spinner"></mat-spinner>
          <span *ngIf="!isLoading()">{{ 'loginBtn' | translate }}</span>
        </button>
      </form>

      <div class="demo-users-section">
        <p class="demo-title">{{ 'testAccountsTitle' | translate }}</p>
        <div class="demo-buttons">
          <button mat-stroked-button type="button" class="demo-btn" id="demo-admin-btn" (click)="fillCredentials('admin', 'password')">
            <mat-icon>admin_panel_settings</mat-icon>
            <span>{{ 'adminDemoAccount' | translate }}</span>
          </button>
          <button mat-stroked-button type="button" class="demo-btn" id="demo-customer-btn" (click)="fillCredentials('customer', 'password')">
            <mat-icon>person</mat-icon>
            <span>{{ 'customerDemoAccount' | translate }}</span>
          </button>
        </div>
      </div>
    </mat-card-content>
  </mat-card>
</div>
