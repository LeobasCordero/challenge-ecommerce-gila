post:
  tags:
    - Auth
  summary: Authenticate user and return JWT
  operationId: login
  security: []
  requestBody:
    required: true
    content:
      application/json:
        schema:
          $ref: '../components/schemas/auth.yaml#/LoginRequestDto'
  responses:
    '200':
      description: Successful authentication
      content:
        application/json:
          schema:
            $ref: '../components/schemas/auth.yaml#/LoginResponseDto'
    '401':
      description: Unauthorized credentials
