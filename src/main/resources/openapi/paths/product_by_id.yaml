get:
  tags:
    - Products
  summary: Get details of a single product
  operationId: getProductById
  security: []
  parameters:
    - name: id
      in: path
      required: true
      schema:
        type: string
        format: uuid
  responses:
    '200':
      description: Product details retrieved
      content:
        application/json:
          schema:
            $ref: '../components/schemas/products.yaml#/ProductDto'
    '404':
      description: Product not found
put:
  tags:
    - Products
  summary: Update an existing product (Admin only)
  operationId: updateProduct
  parameters:
    - name: id
      in: path
      required: true
      schema:
        type: string
        format: uuid
  requestBody:
    required: true
    content:
      application/json:
        schema:
          $ref: '../components/schemas/products.yaml#/ProductDto'
  responses:
    '200':
      description: Product updated successfully
      content:
        application/json:
          schema:
            $ref: '../components/schemas/products.yaml#/ProductDto'
    '404':
      description: Product not found
    '403':
      description: Forbidden operation (requires admin role)
delete:
  tags:
    - Products
  summary: Delete a product (Admin only)
  operationId: deleteProduct
  parameters:
    - name: id
      in: path
      required: true
      schema:
        type: string
        format: uuid
  responses:
    '204':
      description: Product deleted successfully
    '404':
      description: Product not found
    '403':
      description: Forbidden (requires admin role)
