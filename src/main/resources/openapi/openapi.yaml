openapi: 3.0.3
info:
  title: Gila E-Commerce API
  description: API specifications for challenge e-commerce application including products CRUD, bulk CSV import, Redis shopping cart, and purchase checkout.
  version: 1.0.0
servers:
  - url: /
    description: Root URL prefix

security:
  - bearerAuth: []

paths:
  /api/v1/auth/login:
    $ref: './paths/auth.yaml'
  /api/v1/products:
    $ref: './paths/products.yaml'
  /api/v1/products/{id}:
    $ref: './paths/product_by_id.yaml'
  /api/v1/products/import:
    $ref: './paths/product_import.yaml'
  /api/v1/products/import/status/{taskId}:
    $ref: './paths/product_import_status.yaml'
  /api/v1/cart:
    $ref: './paths/cart.yaml'
  /api/v1/cart/items/{productId}:
    $ref: './paths/cart_item.yaml'
  /api/v1/orders/checkout:
    $ref: './paths/order_checkout.yaml'
  /api/v1/orders/clear:
    $ref: './paths/order_clear.yaml'
  /api/v1/audit-logs:
    $ref: './paths/audit_logs.yaml'
  /api/v1/chatbot/query:
    $ref: './paths/chatbot.yaml'

components:
  securitySchemes:
    bearerAuth:
      $ref: './components/security.yaml'
  schemas:
    LoginRequestDto:
      $ref: './components/schemas/auth.yaml#/LoginRequestDto'
    LoginResponseDto:
      $ref: './components/schemas/auth.yaml#/LoginResponseDto'
    ProductDto:
      $ref: './components/schemas/products.yaml#/ProductDto'
    ProductImportStatusDto:
      $ref: './components/schemas/products.yaml#/ProductImportStatusDto'
    CartDto:
      $ref: './components/schemas/cart.yaml#/CartDto'
    CartItemDto:
      $ref: './components/schemas/cart.yaml#/CartItemDto'
    CartItemRequestDto:
      $ref: './components/schemas/cart.yaml#/CartItemRequestDto'
    OrderDto:
      $ref: './components/schemas/orders.yaml#/OrderDto'
    OrderItemDto:
      $ref: './components/schemas/orders.yaml#/OrderItemDto'
    AuditLogDto:
      $ref: './components/schemas/audit_logs.yaml#/AuditLogDto'
    ChatbotRequestDto:
      $ref: './components/schemas/chatbot.yaml#/ChatbotRequestDto'
    ChatbotResponseDto:
      $ref: './components/schemas/chatbot.yaml#/ChatbotResponseDto'
